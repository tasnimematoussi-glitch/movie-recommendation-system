version: "3.8"

# ─────────────────────────────────────────────────────────
# Cluster Hadoop + Spark pour le système de recommandation
# ─────────────────────────────────────────────────────────
#
# Services :
#   hadoop-namenode   → Gestionnaire de métadonnées HDFS
#   hadoop-datanode-1/2/3 → Nœuds de stockage HDFS (réplication ×3)
#   spark-master      → Coordinateur Spark
#   spark-worker-1/2  → Workers Spark pour calcul distribué
#   recommendation-api → API Flask exposant les recommandations
#
# Démarrage :
#   docker-compose up -d
#   docker-compose logs -f spark-master

services:

  # ── HADOOP NAMENODE ──────────────────────────────────
  hadoop-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: hadoop-namenode
    restart: unless-stopped
    ports:
      - "9870:9870"    # UI Web HDFS
      - "9000:9000"    # API HDFS
    environment:
      - CLUSTER_NAME=movielens-cluster
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:9000
      - HDFS_CONF_dfs_replication=3
      - HDFS_CONF_dfs_blocksize=134217728    # 128 MB
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    networks:
      - hadoop-spark-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── HADOOP DATANODES ─────────────────────────────────
  hadoop-datanode-1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: hadoop-datanode-1
    restart: unless-stopped
    environment:
      - SERVICE_PRECONDITION=hadoop-namenode:9870
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:9000
      - HDFS_CONF_dfs_replication=3
    volumes:
      - hadoop_datanode1:/hadoop/dfs/data
    networks:
      - hadoop-spark-net
    depends_on:
      hadoop-namenode:
        condition: service_healthy

  hadoop-datanode-2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: hadoop-datanode-2
    restart: unless-stopped
    environment:
      - SERVICE_PRECONDITION=hadoop-namenode:9870
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:9000
    volumes:
      - hadoop_datanode2:/hadoop/dfs/data
    networks:
      - hadoop-spark-net
    depends_on:
      hadoop-namenode:
        condition: service_healthy

  hadoop-datanode-3:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: hadoop-datanode-3
    restart: unless-stopped
    environment:
      - SERVICE_PRECONDITION=hadoop-namenode:9870
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:9000
    volumes:
      - hadoop_datanode3:/hadoop/dfs/data
    networks:
      - hadoop-spark-net
    depends_on:
      hadoop-namenode:
        condition: service_healthy

  # ── SPARK MASTER ─────────────────────────────────────
  spark-master:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    container_name: spark-master
    restart: unless-stopped
    ports:
      - "8080:8080"    # UI Web Spark
      - "7077:7077"    # Port Spark cluster
    environment:
      - INIT_DAEMON_STEP=setup_spark
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:9000
      - SPARK_CONF_spark_executor_memory=4g
      - SPARK_CONF_spark_driver_memory=2g
      - SPARK_CONF_spark_sql_shuffle_partitions=200
    volumes:
      - ./:/app                          # Code du projet
      - spark_logs:/spark/logs
    networks:
      - hadoop-spark-net
    depends_on:
      - hadoop-namenode

  spark-worker-1:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker-1
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=4
      - SPARK_WORKER_MEMORY=6g
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:9000
    volumes:
      - ./:/app
    networks:
      - hadoop-spark-net
    depends_on:
      - spark-master

  spark-worker-2:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    container_name: spark-worker-2
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=4
      - SPARK_WORKER_MEMORY=6g
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:9000
    volumes:
      - ./:/app
    networks:
      - hadoop-spark-net
    depends_on:
      - spark-master

  # ── API FLASK ────────────────────────────────────────
  recommendation-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recommendation-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - HDFS_URL=hdfs://hadoop-namenode:9000
      - DATA_PATH=hdfs://hadoop-namenode:9000/data/movielens/raw
      - MODEL_PATH=hdfs://hadoop-namenode:9000/models/als_recommender
      - SPARK_MASTER=spark://spark-master:7077
      - FLASK_DEBUG=false
    volumes:
      - ./:/app
    networks:
      - hadoop-spark-net
    depends_on:
      - spark-master
      - hadoop-namenode
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ── VOLUMES ──────────────────────────────────────────────
volumes:
  hadoop_namenode:
  hadoop_datanode1:
  hadoop_datanode2:
  hadoop_datanode3:
  spark_logs:

# ── RÉSEAU ───────────────────────────────────────────────
networks:
  hadoop-spark-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
